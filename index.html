<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f766e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="description" content="Delad Yatzy med digitala tärningar, serier och statistik – alla spelar på samma tavla i realtid." />
<title>Yatzy – Scoreboard</title>
<style>
  :root {
    --bg:#f1f5f9; --panel:#fff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --brand:#0f766e; --brand-ink:#fff; --brand-soft:#ccfbf1; --accent:#f59e0b;
    --empty:#f8fafc; --empty-line:#cbd5e1; --good:#16a34a; --danger:#dc2626;
    --gold:#f59e0b; --preview:#94a3b8;
    --shadow:0 10px 30px rgba(15,23,42,.12); --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0b1220; --panel:#131c2e; --ink:#f1f5f9; --muted:#94a3b8; --line:#24324a;
      --brand:#14b8a6; --brand-ink:#04211d; --brand-soft:#0f2e2a; --empty:#0f1826; --empty-line:#33425e;
      --preview:#5b6b86; --shadow:0 10px 30px rgba(0,0,0,.45);
    }
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-text-size-adjust:100%; }
  body { min-height:100vh; display:flex; flex-direction:column; }
  button { font-family:inherit; }

  header { position:sticky; top:0; z-index:20; background:var(--brand); color:var(--brand-ink);
    padding:calc(9px + var(--safe-t)) 12px 8px; box-shadow:0 2px 10px rgba(0,0,0,.15); }
  .bar { display:flex; align-items:center; gap:10px; }
  .logo { font-size:19px; font-weight:800; letter-spacing:.4px; display:flex; align-items:center; gap:7px; }
  .logo .dice { font-size:21px; }
  .vbadge { font-size:11px; font-weight:700; background:rgba(0,0,0,.18); padding:2px 8px; border-radius:999px; }
  .bar .spacer { flex:1; }
  .iconbtn { appearance:none; border:0; cursor:pointer; background:rgba(255,255,255,.16); color:var(--brand-ink);
    border-radius:11px; padding:8px 11px; font-size:14px; font-weight:700; display:inline-flex; align-items:center; gap:6px; }
  .iconbtn:active { transform:scale(.96); }
  .subbar { display:flex; align-items:center; gap:8px; margin-top:7px; font-size:12px; color:rgba(255,255,255,.9); flex-wrap:wrap; }
  .roomchip { background:rgba(0,0,0,.18); border-radius:999px; padding:4px 10px; font-weight:700; letter-spacing:1px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; }
  .status { display:inline-flex; align-items:center; gap:6px; font-weight:600; }
  .dot { width:8px; height:8px; border-radius:50%; background:#cbd5e1; box-shadow:0 0 0 3px rgba(255,255,255,.15); }
  .dot.live { background:#4ade80; } .dot.off { background:#f59e0b; }

  .tabs { display:flex; gap:6px; background:var(--brand); padding:0 10px calc(9px); }
  .tab { flex:1; appearance:none; border:0; cursor:pointer; background:rgba(0,0,0,.16); color:rgba(255,255,255,.85);
    border-radius:11px; padding:9px 4px; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:5px; }
  .tab.active { background:var(--panel); color:var(--brand); }
  .tab.hidden { display:none; }

  main { flex:1; padding:12px 0 200px; }
  body.d3d main { padding-bottom:320px; }
  .view { display:none; } .view.active { display:block; }

  /* Banners */
  .banner { margin:0 10px 10px; border-radius:14px; padding:11px 14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:10px; font-weight:700; }
  .banner.turn { background:var(--brand-soft); color:var(--brand); }
  .banner.turn.you { background:linear-gradient(135deg,#14b8a6,#0f766e); color:#fff; }
  .banner .em { font-size:22px; }
  .banner .sub { display:block; font-weight:600; font-size:12px; opacity:.85; }
  .winner { margin:0 10px 12px; background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#3b1e00; border-radius:16px; padding:14px 16px; box-shadow:var(--shadow); display:none; align-items:center; gap:12px; font-weight:800; }
  .winner.show { display:flex; } .winner .trophy { font-size:30px; } .winner .wtxt { font-size:16px; line-height:1.25; } .winner .wtxt small { display:block; font-weight:700; opacity:.85; font-size:13px; }

  td.cell.locked { cursor:not-allowed; }
  td.cell.locked .val { background:var(--empty); border:1.5px dashed var(--empty-line); color:var(--muted); opacity:.7; font-size:14px; }
  .tray .undo { appearance:none; border:1px solid var(--line); background:var(--empty); color:var(--ink); border-radius:14px; padding:0 16px; font-size:20px; font-weight:800; cursor:pointer; flex:0 0 auto; }
  .actionbar #undoBtn { flex:0 0 auto; padding:15px 16px; }
  .h2row { display:flex; flex-wrap:wrap; gap:7px; margin:4px 0; }
  .h2chip { appearance:none; border:1px solid var(--line); background:var(--empty); color:var(--ink); border-radius:999px; padding:7px 13px; font-size:13.5px; font-weight:800; cursor:pointer; }
  .h2chip.on { background:var(--brand); color:var(--brand-ink); border-color:transparent; }
  .vs { text-align:center; color:var(--muted); font-size:12px; font-weight:800; margin:2px 0; text-transform:uppercase; letter-spacing:1px; }
  .h2res { display:flex; align-items:center; margin-top:12px; }
  .h2side { flex:1; text-align:center; }
  .h2n { font-size:34px; font-weight:800; color:var(--brand); line-height:1; }
  .h2l { font-weight:800; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .h2a { font-size:12px; color:var(--muted); font-weight:600; }
  .h2mid { flex:0 0 auto; padding:0 10px; text-align:center; color:var(--muted); font-weight:700; font-size:12.5px; }
  .h2mid small { display:block; font-size:11px; margin-top:2px; }

  .tray3d { padding-top:8px; }
  .dicecanvas { width:100%; height:206px; display:block; margin:2px 0 8px; border-radius:16px; touch-action:none;
    background:linear-gradient(180deg,#eef2f7 0%,#e2e8f0 100%); }
  @media (prefers-color-scheme: dark){ .dicecanvas { background:linear-gradient(180deg,#16233c 0%,#0e1a30 100%); } }

  /* Board */
  .board-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; padding:0 10px; }
  table.board { border-collapse:separate; border-spacing:0; width:max-content; min-width:100%; }
  .cat { position:sticky; left:0; z-index:5; background:var(--panel); text-align:left; font-weight:600; font-size:14px;
    padding:0 10px; height:44px; min-width:124px; max-width:150px; border-bottom:1px solid var(--line); border-right:2px solid var(--line); color:var(--ink); }
  .cat small { display:block; color:var(--muted); font-weight:500; font-size:10.5px; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  thead .corner { position:sticky; left:0; top:0; z-index:12; background:var(--panel); border-right:2px solid var(--line); border-bottom:1px solid var(--line);
    min-width:124px; max-width:150px; height:60px; padding:0 10px; text-align:left; color:var(--muted); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; vertical-align:middle; }
  thead th.player { position:sticky; top:0; z-index:8; background:var(--panel); border-bottom:1px solid var(--line); border-left:1px solid var(--line);
    height:60px; min-width:90px; padding:4px 6px; cursor:pointer; vertical-align:middle; }
  thead th.player.active { background:var(--brand-soft); }
  .phead { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .pname { font-weight:800; font-size:14px; max-width:88px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pname .me { color:var(--brand); font-size:10px; }
  .ptotal { font-size:20px; font-weight:800; color:var(--brand); line-height:1.05; }
  .pmeta { font-size:10.5px; color:var(--muted); font-weight:600; } .pmeta.win { color:var(--accent); }
  th.addcol { position:sticky; top:0; z-index:8; background:var(--panel); border-bottom:1px solid var(--line); min-width:54px; }
  .addbtn { appearance:none; border:1px dashed var(--empty-line); background:var(--empty); color:var(--brand); font-weight:800; font-size:20px; width:40px; height:40px; border-radius:11px; cursor:pointer; }
  td.addcol { border-bottom:1px solid var(--line); }
  tr.sec th { position:sticky; left:0; z-index:6; background:var(--bg); color:var(--muted); text-align:left; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; padding:10px 10px 5px; border-bottom:1px solid var(--line); }
  td.cell { border-bottom:1px solid var(--line); border-left:1px solid var(--line); text-align:center; height:44px; min-width:90px; cursor:default; font-size:17px; font-weight:700; color:var(--ink); background:var(--panel); }
  td.cell .val { display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:32px; border-radius:9px; padding:0 6px; }
  td.cell.empty .val { background:var(--empty); border:1.5px dashed var(--empty-line); color:var(--empty-line); font-weight:800; font-size:15px; width:38px; }
  td.cell.zero .val { color:var(--muted); font-weight:600; }
  td.cell.filled .val { background:var(--brand-soft); color:var(--brand); }
  td.cell.tap { cursor:pointer; } td.cell.tap:active { background:var(--line); }
  td.cell.preview .val { background:transparent; border:1.5px solid var(--brand); color:var(--brand); font-weight:800; }
  td.cell.preview.zero .val { border-color:var(--empty-line); color:var(--muted); }
  th.player.active + tbody, .colactive { }
  tr.summary td, tr.summary th { background:var(--bg) !important; }
  tr.summary .cat { background:var(--bg); font-weight:800; }
  tr.summary td.cell { cursor:default; font-weight:800; border-left:1px solid var(--line); }
  .bonus-need { font-size:10.5px; font-weight:700; color:var(--muted); display:block; margin-top:-3px; } .bonus-ok { color:var(--good); }
  tr.total .cat { color:var(--brand); } tr.total td.cell { color:var(--brand); font-size:19px; }

  .empty-state { text-align:center; color:var(--muted); padding:38px 24px; }
  .empty-state h2 { color:var(--ink); font-size:20px; margin:0 0 6px; } .empty-state p { line-height:1.5; margin:0 0 18px; } .empty-state .big { font-size:46px; margin-bottom:6px; }
  .cta { appearance:none; border:0; cursor:pointer; background:var(--brand); color:var(--brand-ink); border-radius:14px; padding:15px 26px; font-size:16px; font-weight:800; box-shadow:var(--shadow); }

  /* Cards (standings + stats) */
  .wrap { padding:4px 12px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); }
  .card h3 { margin:0 0 10px; font-size:15px; display:flex; align-items:center; gap:8px; }
  .rank { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); }
  .rank:last-child { border-bottom:0; }
  .rank .pos { width:26px; height:26px; border-radius:50%; background:var(--empty); color:var(--muted); font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rank .pos.g1 { background:var(--gold); color:#3b1e00; } .rank .pos.g2 { background:#cbd5e1; color:#1e293b; } .rank .pos.g3 { background:#e7b48a; color:#3b1e00; }
  .rank .rn { flex:1; font-weight:700; } .rank .rn small { display:block; color:var(--muted); font-weight:600; font-size:12px; }
  .rank .rv { font-weight:800; font-size:18px; color:var(--brand); } .rank .rv small { color:var(--muted); font-weight:600; font-size:11px; display:block; text-align:right; }
  .progress { height:8px; border-radius:6px; background:var(--empty); overflow:hidden; margin-top:8px; }
  .progress > div { height:100%; background:var(--brand); }
  .statgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .stat { background:var(--empty); border-radius:12px; padding:10px 12px; }
  .stat .k { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
  .stat .v { font-size:22px; font-weight:800; margin-top:2px; } .stat .v small { font-size:12px; color:var(--muted); font-weight:700; }
  .muted-note { color:var(--muted); font-size:12.5px; line-height:1.5; text-align:center; padding:8px 16px; }

  /* Dice tray */
  .tray { position:fixed; left:0; right:0; bottom:0; z-index:16; background:var(--panel); border-top:1px solid var(--line);
    padding:10px 12px calc(12px + var(--safe-b)); box-shadow:0 -8px 24px rgba(0,0,0,.14); }
  .tray .tturn { text-align:center; font-size:13px; font-weight:700; color:var(--muted); margin-bottom:8px; min-height:18px; }
  .tray .tturn b { color:var(--brand); }
  .dicerow { display:flex; justify-content:center; gap:8px; margin-bottom:10px; }
  .die { width:52px; height:52px; border-radius:12px; background:#fff; border:1px solid #e2e8f0; box-shadow:0 2px 5px rgba(0,0,0,.14);
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); padding:8px; cursor:pointer; position:relative; }
  .die .pip { width:9px; height:9px; border-radius:50%; background:#0f172a; align-self:center; justify-self:center; opacity:0; }
  .die .pip.on { opacity:1; }
  .die.blank { background:var(--empty); border-style:dashed; box-shadow:none; }
  .die.held { background:var(--brand-soft); border-color:var(--brand); transform:translateY(3px); }
  .die.held::after { content:"LÅST"; position:absolute; top:-9px; left:50%; transform:translateX(-50%); font-size:8px; font-weight:800; color:var(--brand); background:var(--panel); padding:0 4px; border-radius:4px; }
  .die.rolling { animation:tumble .12s linear infinite; }
  @keyframes tumble { 0%{transform:rotate(0) translateY(0);} 25%{transform:rotate(-9deg) translateY(-3px);} 75%{transform:rotate(9deg) translateY(2px);} 100%{transform:rotate(0) translateY(0);} }
  .tray .tactions { display:flex; gap:10px; }
  .tray .roll { flex:1; appearance:none; border:0; cursor:pointer; background:var(--brand); color:var(--brand-ink); border-radius:14px; padding:15px; font-size:16px; font-weight:800; }
  .tray .roll:disabled { background:var(--empty); color:var(--muted); }
  .tray .hint2 { text-align:center; font-size:11.5px; color:var(--muted); margin-top:7px; }
  .actionbar { position:fixed; left:0; right:0; bottom:0; z-index:15; background:linear-gradient(to top,var(--bg) 68%,transparent); padding:14px; display:flex; gap:10px; justify-content:center; }
  .actionbar button { appearance:none; border:0; cursor:pointer; border-radius:14px; padding:15px 18px; font-size:15px; font-weight:800; box-shadow:var(--shadow); }
  .actionbar .primary { background:var(--brand); color:var(--brand-ink); flex:1; max-width:280px; }
  .actionbar .ghost { background:var(--panel); color:var(--ink); border:1px solid var(--line); }

  /* Sheet */
  .backdrop { position:fixed; inset:0; z-index:40; background:rgba(2,6,23,.55); display:none; align-items:flex-end; justify-content:center; }
  .backdrop.open { display:flex; }
  .sheet { width:100%; max-width:520px; background:var(--panel); color:var(--ink); border-radius:22px 22px 0 0; padding:8px 16px calc(18px + var(--safe-b)); box-shadow:0 -10px 40px rgba(0,0,0,.35); animation:rise .18s ease-out; max-height:88vh; overflow-y:auto; }
  @keyframes rise { from{transform:translateY(30px);opacity:.5;} to{transform:translateY(0);opacity:1;} }
  .grabber { width:44px; height:5px; border-radius:3px; background:var(--line); margin:6px auto 12px; }
  .sheet h3 { margin:0 0 2px; font-size:19px; } .sheet .sub { color:var(--muted); font-size:13px; margin:0 0 14px; }
  .chips { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .chip { appearance:none; border:1px solid var(--line); background:var(--empty); color:var(--ink); border-radius:14px; padding:15px 0; font-size:19px; font-weight:800; cursor:pointer; }
  .chip:active { transform:scale(.96); } .chip.zero { color:var(--muted); }
  .chip.big { grid-column:span 2; background:var(--brand-soft); color:var(--brand); border-color:transparent; }
  .chip.strike { color:var(--danger); }
  .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:4px; }
  .kdisplay { text-align:center; font-size:38px; font-weight:800; padding:4px 0 10px; color:var(--brand); }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  .btn { appearance:none; border:0; cursor:pointer; border-radius:14px; padding:15px 0; font-size:16px; font-weight:800; }
  .btn.primary { background:var(--brand); color:var(--brand-ink); } .btn.sec { background:var(--empty); color:var(--ink); border:1px solid var(--line); } .btn.danger { background:var(--empty); color:var(--danger); border:1px solid var(--line); }
  .btn.full { width:100%; grid-column:1/-1; }
  .menu-list { display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .menu-list button { text-align:left; background:var(--empty); border:1px solid var(--line); color:var(--ink); border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:12px; }
  .menu-list button .em { font-size:20px; } .menu-list button.warn { color:var(--danger); }
  .hint { background:var(--empty); border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-size:13px; color:var(--muted); margin-top:12px; line-height:1.4; }
  .field { width:100%; font-size:18px; padding:13px; border-radius:14px; border:1px solid var(--line); background:var(--empty); color:var(--ink); margin-top:4px; }
  .opts { display:flex; flex-direction:column; gap:9px; margin:8px 0; }
  .opt { display:flex; align-items:flex-start; gap:10px; border:1.5px solid var(--line); border-radius:14px; padding:12px 14px; cursor:pointer; }
  .opt.on { border-color:var(--brand); background:var(--brand-soft); }
  .opt .oi { font-size:22px; } .opt .ot { font-weight:800; } .opt .od { font-size:12.5px; color:var(--muted); margin-top:2px; }
  .opt.on .od { color:var(--brand); }
  .plist { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; }
  .ptag { background:var(--brand-soft); color:var(--brand); border-radius:999px; padding:7px 12px 7px 14px; font-weight:800; font-size:14px; display:flex; align-items:center; gap:8px; }
  .ptag button { appearance:none; border:0; background:transparent; color:var(--brand); font-weight:900; cursor:pointer; font-size:16px; line-height:1; }
  .seg { display:flex; gap:6px; background:var(--empty); padding:4px; border-radius:12px; margin:6px 0; }
  .seg button { flex:1; appearance:none; border:0; background:transparent; color:var(--muted); font-weight:800; padding:9px 4px; border-radius:9px; cursor:pointer; font-size:13.5px; }
  .seg button.on { background:var(--panel); color:var(--brand); box-shadow:0 1px 4px rgba(0,0,0,.1); }
  .inline { display:flex; align-items:center; gap:8px; margin-top:8px; } .inline label { font-size:14px; font-weight:700; }

  .toast { position:fixed; left:50%; bottom:calc(150px + var(--safe-b)); transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:11px 18px; border-radius:999px; font-size:14px; font-weight:700; z-index:60; opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; box-shadow:var(--shadow); white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(-4px); }
</style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="logo"><span class="dice">🎲</span> Yatzy <span class="vbadge" id="vbadge">Yatzy</span></div>
      <div class="spacer"></div>
      <button class="iconbtn" id="shareBtn">📤</button>
      <button class="iconbtn" id="menuBtn" aria-label="Meny">⋯</button>
    </div>
    <div class="subbar">
      <span class="roomchip" id="roomChip" title="Dela">RUM <b id="roomCode">····</b></span>
      <span class="status"><span class="dot" id="statusDot"></span><span id="statusText">Ansluter…</span></span>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" data-tab="play" id="tabPlay">🎲 Spel</button>
    <button class="tab hidden" data-tab="standings" id="tabStandings">🏆 Ställning</button>
    <button class="tab" data-tab="stats" id="tabStats">📊 Statistik</button>
  </div>

  <main>
    <div class="view active" id="view-play">
      <div class="winner" id="winner"><span class="trophy">🏆</span><span class="wtxt" id="winnerText"></span></div>
      <div id="turnBanner"></div>
      <div id="boardHost"></div>
    </div>
    <div class="view" id="view-standings"><div class="wrap" id="standingsHost"></div></div>
    <div class="view" id="view-stats"><div class="wrap" id="statsHost"></div></div>
  </main>

  <div id="bottomHost"></div>

  <div class="backdrop" id="backdrop"><div class="sheet" id="sheet" role="dialog" aria-modal="true"></div></div>
  <div class="toast" id="toast"></div>

<script>/*three3d*/
/**

  function applyDelta(d, isLocal){
    if(!d||!d.t) return; var changed=false, g=state.game;
    if(d.t==="cfg"){
      if((d.ts||0)>=(state.cfg.ts||0)){ state.cfg.variant=d.cfg.variant; state.cfg.mode=d.cfg.mode; state.cfg.series=d.cfg.series; state.cfg.upperFirst=!!d.cfg.upperFirst; state.cfg.ts=d.ts||0; state.cfg.cid=d.cid;

    } else if(d.t==="player"){
      if(!state.players[d.id]){ state.players[d.id]={name:d.name||"Spelare",ct:d.ts||0,nameTs:d.ts||0}; changed=true; }
      else if(d.name&&(d.ts||0)>=(state.players[d.id].nameTs||0)&&state.players[d.id].name!==d.name){ state.players[d.id].name=d.name; state.players[d.id].nameTs=d.ts||0; changed=true; }

        if(g.live.turnPid===d.id) g.live.turnPid=playerList()[0]||null; changed=true; }
    } else if(d.t==="score"){

        if(!ex||(d.ts||0)>(ex.ts||0)||((d.ts||0)===(ex.ts||0)&&String(d.cid)>String(ex.cid||""))){
          if(d.v==null){ if(ex){ delete sc[d.cat]; changed=true; if(g.last&&g.last.pid===d.pid&&g.last.cat===d.cat) g.last=null; } }
          else { sc[d.cat]={v:d.v,ts:d.ts||0,cid:d.cid}; g.last={pid:d.pid,cat:d.cat,yb:0}; changed=true; } } }
    } else if(d.t==="commit"){

        if(!ex2||(d.ts||0)>(ex2.ts||0)){ sc2[d.cat]={v:d.v,ts:d.ts||0,cid:d.cid}; g.last={pid:d.pid,cat:d.cat,yb:d.yb||0}; changed=true; }
        if(d.yb){ g.ybonus[d.pid]=(g.ybonus[d.pid]||0)+d.yb; changed=true; }
        if(d.next && (d.ts||0)>=(g.live.ts||0)){ g.live={turnPid:d.next.turnPid,rollNo:0,values:[],held:[],seq:(g.live.seq||0)+1,ts:d.ts||0,cid:d.cid}; changed=true; } }
    } else if(d.t==="live"){
      if((d.ts||0)>(g.live.ts||0)){ g.live={turnPid:d.turnPid,rollNo:d.rollNo,values:d.values||[],held:d.held||[],seq:d.seq||0,ts:d.ts||0,cid:d.cid,rolled:d.rolled};
        changed=true;
        if(d.rolled && d.seq>lastSeq){ lastSeq=d.seq; triggerDiceRoll(d, d.cid===clientId); } }
    } else if(d.t==="diceval"){
      if(g.live.turnPid===d.turnPid && g.live.rollNo===d.rollNo){
        var key=d.turnPid+"/"+d.rollNo; authVals[key]=d.values.slice();
        var same=g.live.values.length===d.values.length && g.live.values.every(function(x,ix){return x===d.values[ix];});
        if(!same){ g.live.values=d.values.slice(); changed=true; }
        var initd=(d.cid===clientId);
        if(initd || !use3D() || !Dice3D.inited() || !Dice3D.isAnimating()){ finalizeDice(key, initd); }
        // else: still animating on this remote → its throw's settle callback will reconcile
      }

        if(!state.history.some(function(h){return h.no===d.no&&h.variant===(d.variant||state.cfg.variant);}))
          state.history.push({no:d.no,ts:d.ts||0,variant:d.variant||state.cfg.variant,results:d.results,winner:d.winner,order:d.order});
        state.game=blankGame(nextGameNo()); state.game.clearedAt=d.ts||0; state.game.live.turnPid=playerList()[0]||null; state.game.startedTs=d.ts||0;
        changed=true;

    } else if(d.t==="newseries"){

  }

    if(gameComplete()){ document.body.classList.remove("d3d"); if(tray3d&&tray3d.parentNode) tray3d.parentNode.removeChild(tray3d); Dice3D.pause();
      host.innerHTML='<div class="actionbar"><button class="ghost" id="addPlayerFab">＋ Spelare</button><button class="primary" id="nextMatchFab">▶ '+(seriesDone()?"Se resultat":"Nästa match")+'</button></div>'; wireBottom(); return; }
    var turnName=live.turnPid?state.players[live.turnPid].name:"";
    if(!tray3d){ tray3d=document.createElement("div"); tray3d.className="tray tray3d";
      tray3d.innerHTML='<div class="tturn" id="t3turn"></div><canvas id="dice3d" class="dicecanvas"></canvas><div class="tactions" id="t3act"></div><div class="hint2" id="t3hint"></div>'; }
    document.body.classList.add("d3d");
    if(host.firstChild!==tray3d){ host.innerHTML=""; host.appendChild(tray3d); }
    var canvas=tray3d.querySelector("#dice3d");
    if(!Dice3D.inited()){ Dice3D.init(canvas);
      Dice3D.onPick(function(ix){ if(!diceRolling && state.game.live.rollNo>=1 && !gameComplete()){ toggleHold(ix); sfxTick(); vibrate(18); } });
      Dice3D.onImpact(function(vel,kind){ sfxBounce(vel,kind); if(vel>3.2) vibrate(Math.min(45,Math.round(9+vel*2.2))); }); }
    Dice3D.resume(); Dice3D.resize();
    var nLocked=0; if(live.rollNo>=1){ for(var li=0;li<live.held.length;li++) if(live.held[li]) nLocked++; }
    tray3d.querySelector("#t3turn").innerHTML = (live.turnPid?("<b>"+esc(turnName)+"</b>s tur · kast "+live.rollNo+"/3"):"") + (nLocked?' · <span style="color:var(--brand);font-weight:800">🔒 '+nLocked+' låst'+(nLocked>1?'a':'')+'</span>':'');
    var rollLabel = diceRolling?"🎲 Rullar…":(live.rollNo>=3?"Skriv in poäng ovan":(live.rollNo===0?"🎲 Kasta":"🎲 Kasta igen ("+(3-live.rollNo)+" kvar)"));
    var undoB=(state.game.last?'<button class="undo" id="undoBtn" title="Ångra">↩︎</button>':'');
    var shakeB=(shakeSupported()&&!shakeArmed?'<button class="undo" id="shakeBtn" title="Skaka för att kasta">📳</button>':'');
    tray3d.querySelector("#t3act").innerHTML = undoB+shakeB+'<button class="roll" id="rollBtn"'+((live.rollNo>=3||diceRolling)?" disabled":"")+'>'+rollLabel+'</button>';
    tray3d.querySelector("#t3hint").textContent = (live.rollNo<1?(shakeArmed?"Skaka telefonen eller tryck Kasta. Tryck på en tärning för att låsa den.":"Tryck Kasta för att rulla tärningarna. Tryck på en tärning för att låsa den."):"Tryck på tärningar för att låsa dem. Tryck en grön ruta för att skriva in.");
    $("rollBtn").onclick=function(){ rollDice(); };
    var ub=$("undoBtn"); if(ub) ub.onclick=undoLast;
    var sb=$("shakeBtn"); if(sb) sb.onclick=armShake;
    if(!diceRolling){ if(live.rollNo>=1 && live.values.length===V().dice) Dice3D.reflect(live.values.slice(0,V().dice),live.held,live.turnPid+"/"+live.rollNo); else Dice3D.reflect([],[],live.turnPid+"/0"); }
  }

  function renderBottom(){
    var host=$("bottomHost"), pl=playerList();
    if(tab!=="play" || pl.length===0){
      Dice3D.pause(); document.body.classList.remove("d3d");
      if(pl.length===0){ host.innerHTML=""; return; }
      host.innerHTML='<div class="actionbar"><button class="ghost" id="addPlayerFab">＋ Spelare</button><button class="primary" id="shareFab">📤 Bjud in spelare</button></div>';
      wireBottom(); return;
    }
    if(state.cfg.mode!=="digital"){
      Dice3D.pause(); document.body.classList.remove("d3d");
      var undoM=(state.game.last&&!gameComplete())?'<button class="ghost" id="undoBtn">↩︎</button>':'';
      host.innerHTML='<div class="actionbar">'+undoM+'<button class="ghost" id="addPlayerFab">＋ Spelare</button><button class="primary" id="shareFab">📤 Bjud in</button></div>';
      wireBottom(); return;
    }
    if(use3D()){ renderTray3D(); return; }
    // digital tray (CSS fallback when WebGL unavailable)
    var v=V(), live=state.game.live, n=v.dice;
    if(gameComplete()){ host.innerHTML='<div class="actionbar"><button class="ghost" id="addPlayerFab">＋ Spelare</button><button class="primary" id="nextMatchFab">▶ '+(seriesDone()?"Se resultat":"Nästa match")+'</button></div>'; wireBottom(); return; }
    var turnName = live.turnPid?state.players[live.turnPid].name:"";
    var diceHtml=""; for(var i=0;i<n;i++){ var held=live.held[i]; var blank=(live.rollNo<1||live.values.length!==n); diceHtml+='<div class="die'+(blank?" blank":"")+(held&&!blank?" held":"")+'" data-die="'+i+'">'+pipSpans()+'</div>'; }
    var rollLabel = live.rollNo>=3?"Skriv in poäng ovan":(live.rollNo===0?"🎲 Kasta tärningar":"🎲 Kasta igen ("+(3-live.rollNo)+" kvar)");
    host.innerHTML='<div class="tray"><div class="tturn">'+(live.turnPid?("<b>"+esc(turnName)+"</b>s tur · kast "+live.rollNo+"/3"):"")+'</div>'+
      '<div class="dicerow" id="dicerow">'+diceHtml+'</div>'+
      '<div class="tactions">'+(state.game.last?'<button class="undo" id="undoBtn" title="Ångra senaste">↩︎</button>':'')+'<button class="roll" id="rollBtn"'+(live.rollNo>=3?" disabled":"")+'>'+rollLabel+'</button></div>'+
      '<div class="hint2">'+(live.rollNo<1?"Kasta, lås tärningar du vill behålla, kasta om (max 3). Tryck sedan en kategori.":"Lås tärningar genom att trycka på dem. Tryck en grön ruta för att skriva in.")+'</div></div>';
    // set pips to current values
    var els=host.querySelectorAll(".die"); for(var k=0;k<n;k++){ if(live.rollNo>=1&&live.values.length===n){ setPips(els[k],live.values[k]); els[k].classList.toggle("held",!!live.held[k]); els[k].classList.remove("blank"); } }
    $("rollBtn").onclick=rollDice;
    var ub=$("undoBtn"); if(ub) ub.onclick=undoLast;
    host.querySelectorAll(".die").forEach(function(el){ el.onclick=function(){ toggleHold(parseInt(el.getAttribute("data-die"),10)); }; });
  }
  function pipSpans(){ var s=""; for(var i=0;i<9;i++) s+='<span class="pip"></span>'; return s; }
  function wireBottom(){ var a=$("addPlayerFab"); if(a) a.onclick=openAddPlayer; var s=$("shareFab"); if(s) s.onclick=openInvite;
    var ub=$("undoBtn"); if(ub) ub.onclick=undoLast;
    var nm=$("nextMatchFab"); if(nm) nm.onclick=function(){ if(seriesDone()){ tab="standings"; renderAll(); } else { toast("Spel "+state.game.no+" – kör!"); renderAll(); } }; }

  function openScoreSheet(pid,catKey){
    var cat=V().map[catKey], cur=cellVal(pid,catKey);
    var body='<h3>'+esc(cat.sv)+'</h3><p class="sub">'+esc(state.players[pid].name)+' &middot; '+esc(cat.hint||"")+'</p>';
    if(cat.fixed!=null){
      body+='<div class="chips"><button class="chip big'+(cur===cat.fixed?" cur":"")+'" data-v="'+cat.fixed+'">'+cat.fixed+' p</button><button class="chip strike big'+(cur===0?" cur":"")+'" data-v="0">Stryk (0)</button></div>';
    } else {
      body+='<div class="kdisplay" id="kdisp">'+(cur!=null?cur:"0")+'</div><div class="keypad">';
      ["1","2","3","4","5","6","7","8","9"].forEach(function(nn){ body+='<button class="chip" data-k="'+nn+'">'+nn+'</button>'; });
      body+='<button class="chip strike" data-k="clr">C</button><button class="chip" data-k="0">0</button><button class="chip zero" data-k="del">⌫</button></div>';
      body+='<div class="row2"><button class="btn sec" data-v="0">Stryk (0)</button><button class="btn primary" id="kok">Klar</button></div>';
    }
    if(cur!=null) body+='<div class="row2"><button class="btn danger full" id="clearBtn">Rensa rutan</button></div>';
    openSheet(body);
    Array.prototype.forEach.call(sheet.querySelectorAll("[data-v]"),function(b){ b.onclick=function(){ setScore(pid,catKey,parseInt(b.getAttribute("data-v"),10)); closeSheet(); }; });
    var cb=$("clearBtn"); if(cb) cb.onclick=function(){ clearScore(pid,catKey); closeSheet(); };
    if(cat.fixed==null){ var buf=(cur!=null?String(cur):""), disp=$("kdisp"), max=cat.max||60;
      function rf(){ disp.textContent=buf===""?"0":buf; }
      Array.prototype.forEach.call(sheet.querySelectorAll("[data-k]"),function(b){ b.onclick=function(){ var k=b.getAttribute("data-k");
        if(k==="clr") buf=""; else if(k==="del") buf=buf.slice(0,-1); else { if(buf.length<3) buf+=k; } buf=buf.replace(/^0+(?=\d)/,""); if(buf!==""&&parseInt(buf,10)>max) buf=String(max); rf(); }; });
      $("kok").onclick=function(){ var vv=buf===""?0:Math.min(max,parseInt(buf,10)||0); setScore(pid,catKey,vv); closeSheet(); };
    }
  }

  function openAddPlayer(){
    var names=[];
    function redraw(){
      var tags=names.map(function(nm,i){ return '<span class="ptag">'+esc(nm)+'<button data-rm="'+i+'">×</button></span>'; }).join("");
      openSheet('<h3>Spelare</h3><p class="sub">Lägg till alla som är med</p>'+
        (playerList().length?'<div class="muted-note" style="text-align:left;padding:0 0 6px">Redan med: '+playerList().map(function(id){return esc(state.players[id].name);}).join(", ")+'</div>':'')+
        '<div class="plist">'+tags+'</div>'+
        '<input class="field" id="newName" placeholder="Skriv namn och tryck +" maxlength="16" autocomplete="off" />'+
        '<div class="row2"><button class="btn sec" id="addMore">＋ Lägg till namn</button><button class="btn primary" id="addDone">Klar</button></div>'+
        '<div class="hint">Tips: du kan lägga till fler spelare när som helst.</div>');
      var input=$("newName"); setTimeout(function(){ try{input.focus();}catch(e){} },50);
      function push(){ var v=input.value.trim(); if(v){ names.push(v); } redraw(); }
      $("addMore").onclick=push;
      input.onkeydown=function(e){ if(e.key==="Enter"){ e.preventDefault(); push(); } };
      $("addDone").onclick=function(){ var v=input.value.trim(); if(v) names.push(v); names.forEach(function(nm){ addPlayer(nm); }); closeSheet(); if(names.length) toast(names.length+" spelare tillagda"); };
      Array.prototype.forEach.call(sheet.querySelectorAll("[data-rm]"),function(b){ b.onclick=function(){ names.splice(parseInt(b.getAttribute("data-rm"),10),1); redraw(); }; });
    }
    redraw();
  }

  function openSetup(){
    var c=JSON.parse(JSON.stringify(state.cfg));
    function draw(){
      var vHtml=Object.keys(VARIANTS).map(function(id){ var V2=VARIANTS[id]; var on=c.variant===id;
        var desc=id==="yatzy"?"5 tärningar · 15 rutor · klassisk svensk":id==="maxi"?"6 tärningar · 20 rutor · bonus vid 84":"5 tärningar · 13 rutor · joker & bonus";
        return '<div class="opt'+(on?" on":"")+'" data-variant="'+id+'"><div class="oi">'+(id==="maxi"?"🎲":id==="yahtzee"?"🇺🇸":"🇸🇪")+'</div><div><div class="ot">'+esc(V2.name)+'</div><div class="od">'+desc+'</div></div></div>'; }).join("");
      var modeHtml='<div class="seg"><button data-mode="digital" class="'+(c.mode==="digital"?"on":"")+'">🎲 Digitala tärningar</button><button data-mode="manual" class="'+(c.mode==="manual"?"on":"")+'">✍️ Egna tärningar</button></div>';
      var sf=c.series.format;

      var extra="";
      if(sf==="matches") extra='<div class="inline"><label>Antal matcher:</label><input class="field" id="nInput" style="width:90px;margin:0" type="number" min="2" max="50" value="'+c.series.n+'"/></div>'+

      if(sf==="race") extra='<div class="inline"><label>Målpoäng:</label><input class="field" id="tInput" style="width:120px;margin:0" type="number" min="100" max="10000" step="50" value="'+c.series.target+'"/></div>';
      var ruleHtml='<div class="seg"><button data-uf="0" class="'+(!c.upperFirst?"on":"")+'">Fritt</button><button data-uf="1" class="'+(c.upperFirst?"on":"")+'">Övre delen först</button></div>'+
        '<div class="muted-note" style="text-align:left;padding:6px 2px 0">'+(c.upperFirst?"Du måste fylla i hela övre delen (Ettor–Sexor) innan du får börja på nedre delen.":"Fyll i kategorierna i valfri ordning.")+'</div>';
      openSheet('<h3>Inställningar</h3><p class="sub">Ändra när som helst – gäller för alla i rummet</p>'+
        '<div class="sub" style="font-weight:800;color:var(--ink)">Variant</div><div class="opts">'+vHtml+'</div>'+
        '<div class="sub" style="font-weight:800;color:var(--ink);margin-top:6px">Tärningar</div>'+modeHtml+
        '<div class="sub" style="font-weight:800;color:var(--ink);margin-top:6px">Ordning</div>'+ruleHtml+
        '<div class="sub" style="font-weight:800;color:var(--ink);margin-top:6px">Spelform</div>'+serHtml+extra+
        '<div class="row2"><button class="btn sec" id="setCancel">Avbryt</button><button class="btn primary" id="setSave">Spara</button></div>'+
        '<div class="hint">Byter du variant mitt i ett spel nollställs den pågående matchen. Statistik sparas per variant.</div>');
      Array.prototype.forEach.call(sheet.querySelectorAll("[data-variant]"),function(b){ b.onclick=function(){ c.variant=b.getAttribute("data-variant"); draw(); }; });
      Array.prototype.forEach.call(sheet.querySelectorAll("[data-mode]"),function(b){ b.onclick=function(){ c.mode=b.getAttribute("data-mode"); draw(); }; });
      Array.prototype.forEach.call(sheet.querySelectorAll("[data-fmt]"),function(b){ b.onclick=function(){ c.series.format=b.getAttribute("data-fmt"); draw(); }; });
      Array.prototype.forEach.call(sheet.querySelectorAll("[data-rank]"),function(b){ b.onclick=function(){ c.series.rankBy=b.getAttribute("data-rank"); draw(); }; });
      Array.prototype.forEach.call(sheet.querySelectorAll("[data-uf]"),function(b){ b.onclick=function(){ c.upperFirst=(b.getAttribute("data-uf")==="1"); draw(); }; });
      var ni=$("nInput"); if(ni) ni.onchange=function(){ c.series.n=Math.max(2,Math.min(50,parseInt(ni.value,10)||3)); };
      var ti=$("tInput"); if(ti) ti.onchange=function(){ c.series.target=Math.max(100,parseInt(ti.value,10)||1000); };
      $("setCancel").onclick=closeSheet;
      $("setSave").onclick=function(){
        var ni2=$("nInput"); if(ni2) c.series.n=Math.max(2,Math.min(50,parseInt(ni2.value,10)||3));
        var ti2=$("tInput"); if(ti2) c.series.target=Math.max(100,parseInt(ti2.value,10)||1000);
        var variantChanged=(c.variant!==state.cfg.variant);
        var upperFirstChanged=(!!c.upperFirst!==!!state.cfg.upperFirst);
        setConfig({variant:c.variant,mode:c.mode,upperFirst:c.upperFirst,series:c.series});
        if(variantChanged || upperFirstChanged) emit({t:"resetgame"}); // fresh board when rules change (history kept per variant)
        closeSheet(); toast("Inställningar sparade");
      };
    }
    draw();
  }

  function doShare(){ var url=location.href;
    if(navigator.share){ navigator.share({title:"Yatzy scoreboard",text:"Häng med i Yatzy – rum "+room,url:url}).catch(function(){}); }
    else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(function(){toast("Länk kopierad ✓");},function(){prompt("Kopiera länken:",url);}); }
    else prompt("Kopiera länken:",url); }
  function qrSVG(text,size){ try{ if(!window.qrcode) return ""; var qr=window.qrcode(0,"M"); qr.addData(text); qr.make(); var n=qr.getModuleCount();
    var cell=Math.max(2,Math.floor(size/(n+2))), margin=cell*2, dim=cell*n+margin*2, rects="";
    for(var r=0;r<n;r++) for(var col=0;col<n;col++) if(qr.isDark(r,col)) rects+='<rect x="'+(margin+col*cell)+'" y="'+(margin+r*cell)+'" width="'+cell+'" height="'+cell+'"/>';
    return '<svg xmlns="http://www.w3.org/2000/svg" width="'+dim+'" height="'+dim+'" viewBox="0 0 '+dim+' '+dim+'" shape-rendering="crispEdges" style="border-radius:14px;max-width:70vw"><rect width="'+dim+'" height="'+dim+'" fill="#fff"/><g fill="#0f172a">'+rects+'</g></svg>'; }catch(e){ return ""; } }
  function openInvite(){ var url=location.href, qr=qrSVG(url,280);

  // ============================================================ EVENTS
  document.addEventListener("click",function(e){
    if(!e.target.closest) return;
    var commitCell=e.target.closest('td.cell[data-commit]');
    if(commitCell){ var pid=commitCell.getAttribute("data-player"), cat=commitCell.getAttribute("data-cat");
      var pv=scoreCat(state.cfg.variant,cat,state.game.live.values.slice(0,V().dice),filledMap(pid));
      if(pv===0){ if(confirm("Detta ger 0 poäng (stryk "+V().map[cat].sv+"). Bekräfta?")) commit(pid,cat); }
      else commit(pid,cat);
      return; }
    var manualCell=e.target.closest('td.cell.tap[data-cat]:not([data-commit])');
    if(manualCell && state.cfg.mode==="manual"){ openScoreSheet(manualCell.getAttribute("data-player"),manualCell.getAttribute("data-cat")); return; }
    var ph=e.target.closest("th.player[data-player]");
    if(ph){ openPlayerSheet(ph.getAttribute("data-player")); return; }
    if(e.target.closest("#addColBtn")){ openAddPlayer(); return; }
    if(e.target.closest("#welcomeAdd")){ openAddPlayer(); return; }
    if(e.target.closest("#welcomeSetup")){ e.preventDefault(); openSetup(); return; }
  });
  Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){ b.onclick=function(){ tab=b.getAttribute("data-tab"); renderAll(); }; });
  $("shareBtn").onclick=openInvite; $("roomChip").onclick=openInvite; $("menuBtn").onclick=openMenu;
  window.addEventListener("hashchange",function(){ var r=currentRoom(); if(r&&r!==room) location.reload(); });
  window.addEventListener("online",function(){ setStatus("connecting"); connect(); });
  window.addEventListener("offline",function(){ setStatus("off"); });
  window.addEventListener("resize",function(){ try{ Dice3D.resize(); }catch(e){} });

  // ============================================================ BOOT
  loadLocal();
  if(state.cfg.mode==="digital" && !state.game.live.turnPid) state.game.live.turnPid=playerList()[0]||null;
  renderAll();
  setStatus(navigator.onLine?"connecting":"off");
  if(navigator.onLine) connect();
})();
</script>
</body>
</html>
