<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f766e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="description" content="Delad Yatzy-scoreboard – alla ser samma tavla på sin telefon och kan fylla i poäng." />
<title>Yatzy – Scoreboard</title>
<style>
  :root {
    --bg: #f1f5f9;
    --panel: #ffffff;
    --ink: #0f172a;
    --muted: #64748b;
    --line: #e2e8f0;
    --brand: #0f766e;
    --brand-ink: #ffffff;
    --brand-soft: #ccfbf1;
    --accent: #f59e0b;
    --empty: #f8fafc;
    --empty-line: #cbd5e1;
    --good: #16a34a;
    --danger: #dc2626;
    --shadow: 0 10px 30px rgba(15,23,42,.12);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1220;
      --panel: #131c2e;
      --ink: #f1f5f9;
      --muted: #94a3b8;
      --line: #24324a;
      --brand: #14b8a6;
      --brand-ink: #04211d;
      --brand-soft: #0f2e2a;
      --empty: #0f1826;
      --empty-line: #33425e;
      --shadow: 0 10px 30px rgba(0,0,0,.45);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  body { min-height: 100vh; display: flex; flex-direction: column; }

  /* ---------- Top bar ---------- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--brand); color: var(--brand-ink);
    padding: calc(10px + var(--safe-t)) 12px 10px;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
  }
  .bar { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: .5px; display: flex; align-items: center; gap: 8px; }
  .logo .dice { font-size: 22px; }
  .bar .spacer { flex: 1; }
  .iconbtn {
    appearance: none; border: 0; cursor: pointer;
    background: rgba(255,255,255,.16); color: var(--brand-ink);
    border-radius: 12px; padding: 9px 12px; font-size: 15px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .iconbtn:active { transform: scale(.96); }
  .subbar {
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
    font-size: 13px; color: rgba(255,255,255,.9); flex-wrap: wrap;
  }
  .roomchip {
    background: rgba(0,0,0,.18); border-radius: 999px; padding: 5px 11px;
    font-weight: 700; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 7px;
    cursor: pointer;
  }
  .status { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #cbd5e1; box-shadow: 0 0 0 3px rgba(255,255,255,.15); }
  .dot.live { background: #4ade80; }
  .dot.off { background: #f59e0b; }

  /* ---------- Board ---------- */
  main { flex: 1; padding: 12px 0 148px; }
  .board-wrap {
    overflow-x: auto; overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    padding: 0 10px;
  }
  table.board { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
  table.board th, table.board td { padding: 0; }
  .cat {
    position: sticky; left: 0; z-index: 5;
    background: var(--panel);
    text-align: left; font-weight: 600; font-size: 14px;
    padding: 0 12px; height: 46px; min-width: 132px; max-width: 150px;
    border-bottom: 1px solid var(--line); border-right: 2px solid var(--line);
    color: var(--ink);
  }
  .cat small { display: block; color: var(--muted); font-weight: 500; font-size: 11px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  thead .corner {
    position: sticky; left: 0; top: 0; z-index: 12;
    background: var(--panel); border-right: 2px solid var(--line); border-bottom: 1px solid var(--line);
    min-width: 132px; max-width: 150px; height: 64px; padding: 0 12px; text-align: left;
    color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    vertical-align: middle;
  }
  thead th.player {
    position: sticky; top: 0; z-index: 8;
    background: var(--panel); border-bottom: 1px solid var(--line); border-left: 1px solid var(--line);
    height: 64px; min-width: 94px; padding: 4px 6px; cursor: pointer; vertical-align: middle;
  }
  .phead { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .pname { font-weight: 800; font-size: 15px; max-width: 92px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ptotal { font-size: 21px; font-weight: 800; color: var(--brand); line-height: 1.05; }
  .pmeta { font-size: 11px; color: var(--muted); font-weight: 600; }
  .pmeta.win { color: var(--accent); }
  th.addcol { position: sticky; top: 0; z-index: 8; background: var(--panel); border-bottom: 1px solid var(--line); min-width: 60px; }
  .addbtn {
    appearance: none; border: 1px dashed var(--empty-line); background: var(--empty);
    color: var(--brand); font-weight: 800; font-size: 22px; width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
  }
  td.addcol { border-bottom: 1px solid var(--line); }

  tr.sec th {
    position: sticky; left: 0; z-index: 6;
    background: var(--bg); color: var(--muted);
    text-align: left; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
    padding: 12px 12px 6px; border-bottom: 1px solid var(--line);
  }

  td.cell {
    border-bottom: 1px solid var(--line); border-left: 1px solid var(--line);
    text-align: center; height: 46px; min-width: 94px; cursor: pointer;
    font-size: 18px; font-weight: 700; color: var(--ink);
    background: var(--panel);
  }
  td.cell .val { display: inline-flex; align-items: center; justify-content: center; min-width: 40px; height: 34px; border-radius: 9px; padding: 0 6px; }
  td.cell.empty .val {
    background: var(--empty); border: 1.5px dashed var(--empty-line);
    color: var(--empty-line); font-weight: 800; font-size: 16px; width: 40px;
  }
  td.cell.zero .val { color: var(--muted); font-weight: 600; }
  td.cell.filled .val { background: var(--brand-soft); color: var(--brand); }
  td.cell:active { background: var(--line); }

  tr.summary td, tr.summary th { background: var(--bg) !important; }
  tr.summary .cat { background: var(--bg); font-weight: 800; }
  tr.summary td.cell { cursor: default; font-weight: 800; border-left: 1px solid var(--line); }
  tr.summary td.cell:active { background: var(--bg); }
  .bonus-need { font-size: 11px; font-weight: 700; color: var(--muted); display:block; margin-top:-3px; }
  .bonus-ok { color: var(--good); }
  tr.total .cat { color: var(--brand); }
  tr.total td.cell { color: var(--brand); font-size: 20px; }

  .empty-state { text-align: center; color: var(--muted); padding: 44px 24px; }
  .empty-state h2 { color: var(--ink); font-size: 19px; margin: 0 0 6px; }
  .empty-state p { line-height: 1.5; margin: 0; }
  .empty-state .big { font-size: 46px; margin-bottom: 8px; }

  /* ---------- Bottom action bar ---------- */
  .fab {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 15;
    background: linear-gradient(to top, var(--bg) 68%, transparent);
    padding: 14px 14px calc(14px + var(--safe-b));
    display: flex; gap: 10px; justify-content: center;
  }
  .fab button {
    appearance: none; border: 0; cursor: pointer; border-radius: 14px;
    padding: 15px 18px; font-size: 15px; font-weight: 800; box-shadow: var(--shadow);
  }
  .fab .primary { background: var(--brand); color: var(--brand-ink); flex: 1; max-width: 280px; }
  .fab .ghost { background: var(--panel); color: var(--ink); border: 1px solid var(--line); }

  /* ---------- Sheet ---------- */
  .backdrop {
    position: fixed; inset: 0; z-index: 40; background: rgba(2,6,23,.55);
    display: none; align-items: flex-end; justify-content: center;
  }
  .backdrop.open { display: flex; }
  .sheet {
    width: 100%; max-width: 520px; background: var(--panel); color: var(--ink);
    border-radius: 22px 22px 0 0; padding: 8px 16px calc(18px + var(--safe-b));
    box-shadow: 0 -10px 40px rgba(0,0,0,.35);
    animation: rise .18s ease-out;
  }
  @keyframes rise { from { transform: translateY(30px); opacity: .5; } to { transform: translateY(0); opacity: 1; } }
  .grabber { width: 44px; height: 5px; border-radius: 3px; background: var(--line); margin: 6px auto 12px; }
  .sheet h3 { margin: 0 0 2px; font-size: 19px; }
  .sheet .sub { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
  .chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .chip {
    appearance: none; border: 1px solid var(--line); background: var(--empty); color: var(--ink);
    border-radius: 14px; padding: 16px 0; font-size: 20px; font-weight: 800; cursor: pointer;
  }
  .chip:active { transform: scale(.96); }
  .chip.zero { color: var(--muted); }
  .chip.big { grid-column: span 2; background: var(--brand-soft); color: var(--brand); border-color: transparent; }
  .chip.strike { color: var(--danger); border-color: var(--line); background: var(--empty); }
  .chip.cur { outline: 3px solid var(--brand); outline-offset: -1px; }
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
  .kdisplay { text-align: center; font-size: 40px; font-weight: 800; padding: 6px 0 12px; min-height: 56px; color: var(--brand); }
  .sheet .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .btn { appearance: none; border: 0; cursor: pointer; border-radius: 14px; padding: 15px 0; font-size: 16px; font-weight: 800; }
  .btn.primary { background: var(--brand); color: var(--brand-ink); }
  .btn.sec { background: var(--empty); color: var(--ink); border: 1px solid var(--line); }
  .btn.danger { background: var(--empty); color: var(--danger); border: 1px solid var(--line); }
  .btn.full { width: 100%; grid-column: 1 / -1; }
  .menu-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
  .menu-list button {
    text-align: left; background: var(--empty); border: 1px solid var(--line); color: var(--ink);
    border-radius: 14px; padding: 15px 16px; font-size: 16px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
  }
  .menu-list button .em { font-size: 20px; }
  .menu-list button.warn { color: var(--danger); }
  .hint { background: var(--empty); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--muted); margin-top: 12px; line-height: 1.4; }
  .field { width: 100%; font-size: 18px; padding: 14px; border-radius: 14px; border: 1px solid var(--line); background: var(--empty); color: var(--ink); margin-top: 4px; }

  .toast {
    position: fixed; left: 50%; bottom: calc(104px + var(--safe-b)); transform: translateX(-50%);
    background: var(--ink); color: var(--bg); padding: 11px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 700; z-index: 60; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s; box-shadow: var(--shadow); white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  .winner {
    margin: 0 10px 12px; background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #3b1e00; border-radius: 16px; padding: 14px 16px; box-shadow: var(--shadow);
    display: none; align-items: center; gap: 12px; font-weight: 800;
  }
  .winner.show { display: flex; }
  .winner .trophy { font-size: 30px; }
  .winner .wtxt { font-size: 16px; line-height: 1.25; }
  .winner .wtxt small { display:block; font-weight:700; opacity:.85; font-size:13px; }
</style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="logo"><span class="dice">🎲</span> Yatzy</div>
      <div class="spacer"></div>
      <button class="iconbtn" id="shareBtn">📤 Dela</button>
      <button class="iconbtn" id="menuBtn" aria-label="Meny">⋯</button>
    </div>
    <div class="subbar">
      <span class="roomchip" id="roomChip" title="Tryck för att dela">RUM <b id="roomCode">····</b></span>
      <span class="status"><span class="dot" id="statusDot"></span><span id="statusText">Ansluter…</span></span>
    </div>
  </header>

  <main>
    <div class="winner" id="winner">
      <span class="trophy">🏆</span>
      <span class="wtxt" id="winnerText"></span>
    </div>
    <div id="boardHost"></div>
  </main>

  <div class="fab">
    <button class="ghost" id="addPlayerFab">＋ Spelare</button>
    <button class="primary" id="shareFab">📤 Bjud in spelare</button>
  </div>

  <div class="backdrop" id="backdrop">
    <div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
"use strict";
(function () {
  // ---------------------------------------------------------------- Config
  var TOPIC_PREFIX = "kindfilter_yatzy_v1_";
  var NTFY = "https://ntfy.sh/";
  var ROOM_ALPHABET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

  var CATS = [
    { key: "ettor",  label: "Ettor",  hint: "Summan av alla 1:or", sec: "upper", kind: "mult", mult: 1, count: 5 },
    { key: "tvaor",  label: "Tvåor",  hint: "Summan av alla 2:or", sec: "upper", kind: "mult", mult: 2, count: 5 },
    { key: "treor",  label: "Treor",  hint: "Summan av alla 3:or", sec: "upper", kind: "mult", mult: 3, count: 5 },
    { key: "fyror",  label: "Fyror",  hint: "Summan av alla 4:or", sec: "upper", kind: "mult", mult: 4, count: 5 },
    { key: "femmor", label: "Femmor", hint: "Summan av alla 5:or", sec: "upper", kind: "mult", mult: 5, count: 5 },
    { key: "sexor",  label: "Sexor",  hint: "Summan av alla 6:or", sec: "upper", kind: "mult", mult: 6, count: 5 },

    { key: "ettpar",     label: "Ett par",     hint: "2 lika – högsta paret", sec: "lower", kind: "mult", mult: 2, count: 6 },
    { key: "tvapar",     label: "Två par",     hint: "Två olika par", sec: "lower", kind: "list", values: [0,6,8,10,12,14,16,18,20,22] },
    { key: "tretal",     label: "Tretal",      hint: "3 lika", sec: "lower", kind: "mult", mult: 3, count: 6 },
    { key: "fyrtal",     label: "Fyrtal",      hint: "4 lika", sec: "lower", kind: "mult", mult: 4, count: 6 },
    { key: "litenstege", label: "Liten stege", hint: "1-2-3-4-5 = 15 p", sec: "lower", kind: "fixed", val: 15 },
    { key: "storstege",  label: "Stor stege",  hint: "2-3-4-5-6 = 20 p", sec: "lower", kind: "fixed", val: 20 },
    { key: "kak",        label: "Kåk",         hint: "Par + tretal (summan)", sec: "lower", kind: "free", min: 0, max: 28 },
    { key: "chans",      label: "Chans",       hint: "Summan av alla tärningar", sec: "lower", kind: "free", min: 0, max: 30 },
    { key: "yatzy",      label: "Yatzy",       hint: "5 lika = 50 p", sec: "lower", kind: "fixed", val: 50 }
  ];
  var CAT_BY_KEY = {};
  CATS.forEach(function (c) { CAT_BY_KEY[c.key] = c; });
  var UPPER_KEYS = CATS.filter(function (c) { return c.sec === "upper"; }).map(function (c) { return c.key; });
  var LOWER_KEYS = CATS.filter(function (c) { return c.sec === "lower"; }).map(function (c) { return c.key; });
  var BONUS_LIMIT = 63, BONUS_VALUE = 50;

  // ---------------------------------------------------------------- Helpers
  var $ = function (id) { return document.getElementById(id); };
  function rid(len, alpha) {
    alpha = alpha || ROOM_ALPHABET; len = len || 4;
    var s = "", a = new Uint8Array(len), i;
    if (window.crypto && window.crypto.getRandomValues) window.crypto.getRandomValues(a);
    else for (i = 0; i < len; i++) a[i] = Math.floor(Math.random() * 256);
    for (i = 0; i < len; i++) s += alpha[a[i] % alpha.length];
    return s;
  }
  function esc(s) { return String(s).replace(/[&<>"']/g, function (m) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[m]; }); }
  var toastTimer;
  function toast(msg) {
    var t = $("toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer = setTimeout(function () { t.classList.remove("show"); }, 1900);
  }

  // ---------------------------------------------------------------- Identity + room
  var clientId = localStorage.getItem("yz_cid");
  if (!clientId) { clientId = rid(8, "abcdefghijklmnopqrstuvwxyz0123456789"); localStorage.setItem("yz_cid", clientId); }

  function currentRoom() {
    var h = (location.hash || "").replace(/^#/, "").trim().toUpperCase();
    if (/^[A-Z0-9]{3,8}$/.test(h)) return h;
    return null;
  }
  var room = currentRoom();
  if (!room) { room = rid(4); history.replaceState(null, "", "#" + room); }
  var topic = TOPIC_PREFIX + room;
  var storeKey = "yz_state_" + room;

  // ---------------------------------------------------------------- State
  var state = { players: {}, order: [], scores: {}, clearedAt: 0 };

  function loadLocal() {
    try {
      var raw = localStorage.getItem(storeKey);
      if (raw) { var s = JSON.parse(raw); if (s && s.players) state = s; }
    } catch (e) {}
    if (!state.players) state.players = {};
    if (!state.scores) state.scores = {};
    if (!state.order) state.order = Object.keys(state.players);
    if (!state.clearedAt) state.clearedAt = 0;
  }
  function saveLocal() { try { localStorage.setItem(storeKey, JSON.stringify(state)); } catch (e) {} }

  function playerList() { return state.order.filter(function (id) { return state.players[id]; }); }
  function ensureScore(pid) { if (!state.scores[pid]) state.scores[pid] = {}; return state.scores[pid]; }
  function cellVal(pid, cat) {
    var c = state.scores[pid] && state.scores[pid][cat];
    return c && c.v != null ? c.v : null;
  }
  function hasCell(pid, cat) {
    var c = state.scores[pid] && state.scores[pid][cat];
    return !!(c && c.v != null);
  }

  // ---------------------------------------------------------------- Derived
  function derive(pid) {
    var up = 0, upFilled = 0;
    UPPER_KEYS.forEach(function (k) { if (hasCell(pid, k)) { up += cellVal(pid, k); upFilled++; } });
    var bonus = up >= BONUS_LIMIT ? BONUS_VALUE : 0;
    var low = 0;
    LOWER_KEYS.forEach(function (k) { if (hasCell(pid, k)) low += cellVal(pid, k); });
    var filled = 0;
    CATS.forEach(function (c) { if (hasCell(pid, c.key)) filled++; });
    return {
      upper: up, upperFilled: upFilled, bonus: bonus, lower: low,
      total: up + bonus + low, filled: filled, remaining: CATS.length - filled,
      toBonus: Math.max(0, BONUS_LIMIT - up)
    };
  }

  // ---------------------------------------------------------------- Sync (ntfy)
  var es = null;
  function setStatus(kind) {
    var dot = $("statusDot"), txt = $("statusText");
    dot.className = "dot " + (kind === "live" ? "live" : kind === "off" ? "off" : "");
    txt.textContent = kind === "live" ? "Live – alla ser samma tavla" : kind === "off" ? "Offline – sparat lokalt" : "Ansluter…";
  }
  function publish(delta) {
    if (!navigator.onLine) return;
    try {
      fetch(NTFY + topic, { method: "POST", body: JSON.stringify(delta), keepalive: true }).catch(function () {});
    } catch (e) {}
  }
  function connect() {
    if (es) { try { es.close(); } catch (e) {} }
    if (!window.EventSource) { setStatus("off"); return; }
    try { es = new EventSource(NTFY + topic + "/sse?since=all"); }
    catch (e) { setStatus("off"); return; }
    es.onopen = function () { setStatus("live"); };
    es.onmessage = function (e) {
      try {
        var env = JSON.parse(e.data);
        if (env.event && env.event !== "message") return;
        if (!env.message) return;
        applyDelta(JSON.parse(env.message), false);
      } catch (err) {}
    };
    es.onerror = function () { setStatus(navigator.onLine ? "connecting" : "off"); };
  }

  // ---------------------------------------------------------------- Apply deltas
  function applyDelta(d, isLocal) {
    if (!d || !d.t) return;
    var changed = false;
    if (d.t === "player") {
      if (!state.players[d.id]) { state.players[d.id] = { name: d.name || "Spelare", ct: d.ts || 0, nameTs: d.ts || 0 }; changed = true; }
      else if (d.name && (d.ts || 0) >= (state.players[d.id].nameTs || 0) && state.players[d.id].name !== d.name) {
        state.players[d.id].name = d.name; state.players[d.id].nameTs = d.ts || 0; changed = true;
      }
      if (state.order.indexOf(d.id) === -1) { state.order.push(d.id); changed = true; }
      state.order.sort(function (a, b) { return (state.players[a] ? state.players[a].ct || 0 : 0) - (state.players[b] ? state.players[b].ct || 0 : 0); });
    } else if (d.t === "removePlayer") {
      if (state.players[d.id]) {
        delete state.players[d.id]; delete state.scores[d.id];
        var ix = state.order.indexOf(d.id); if (ix >= 0) state.order.splice(ix, 1);
        changed = true;
      }
    } else if (d.t === "score") {
      if ((d.ts || 0) > state.clearedAt) {
        var sc = ensureScore(d.pid), ex = sc[d.cat];
        if (!ex || (d.ts || 0) > (ex.ts || 0) || ((d.ts || 0) === (ex.ts || 0) && String(d.cid) > String(ex.cid || ""))) {
          if (d.v == null) { if (ex) { delete sc[d.cat]; changed = true; } }
          else { sc[d.cat] = { v: d.v, ts: d.ts || 0, cid: d.cid }; changed = true; }
        }
      }
    } else if (d.t === "reset") {
      if ((d.ts || 0) > state.clearedAt) {
        state.clearedAt = d.ts || 0;
        Object.keys(state.scores).forEach(function (pid) {
          var sc = state.scores[pid];
          Object.keys(sc).forEach(function (cat) { if ((sc[cat].ts || 0) <= state.clearedAt) delete sc[cat]; });
        });
        changed = true;
      }
    }
    if (changed) { saveLocal(); render(); }
  }

  function emit(delta) {
    delta.cid = clientId;
    delta.ts = Date.now();
    applyDelta(delta, true);
    publish(delta);
  }

  // ---------------------------------------------------------------- Actions
  function addPlayer(name) {
    name = (name || "").trim() || ("Spelare " + (playerList().length + 1));
    emit({ t: "player", id: rid(6, "abcdefghijklmnopqrstuvwxyz0123456789"), name: name });
  }
  function renamePlayer(id, name) { name = (name || "").trim(); if (name) emit({ t: "player", id: id, name: name }); }
  function removePlayer(id) { emit({ t: "removePlayer", id: id }); }
  function setScore(pid, cat, value) { emit({ t: "score", pid: pid, cat: cat, v: value }); }
  function clearScore(pid, cat) { emit({ t: "score", pid: pid, cat: cat, v: null }); }
  function resetGame() { emit({ t: "reset" }); }

  // ---------------------------------------------------------------- Render
  function render() {
    $("roomCode").textContent = room;
    var players = playerList();
    var host = $("boardHost");

    if (players.length === 0) {
      host.innerHTML =
        '<div class="empty-state"><div class="big">🎲</div>' +
        '<h2>Dags att spela Yatzy!</h2>' +
        '<p>Lägg till spelarna och fyll i poängen efter varje omgång.<br>Dela rummet så ser alla samma tavla på sin telefon.</p></div>';
      $("winner").classList.remove("show");
      return;
    }

    var d = {};
    players.forEach(function (id) { d[id] = derive(id); });
    var allDone = true, maxTotal = -1;
    players.forEach(function (id) { if (d[id].remaining > 0) allDone = false; if (d[id].total > maxTotal) maxTotal = d[id].total; });

    var html = '<div class="board-wrap"><table class="board"><thead><tr>';
    html += '<th class="corner">Kategori</th>';
    players.forEach(function (id) {
      var pd = d[id];
      var isWin = allDone && pd.total === maxTotal;
      var meta = pd.remaining > 0 ? (pd.remaining + " kvar") : (isWin ? "🏆 Vinnare" : "Klar");
      html += '<th class="player" data-player="' + id + '"><div class="phead">' +
        '<span class="pname">' + esc(state.players[id].name) + '</span>' +
        '<span class="ptotal">' + pd.total + '</span>' +
        '<span class="pmeta' + (isWin ? " win" : "") + '">' + meta + '</span></div></th>';
    });
    html += '<th class="addcol"><button class="addbtn" id="addColBtn" aria-label="Lägg till spelare">＋</button></th></tr></thead><tbody>';

    html += secRow("Övre delen", players.length);
    UPPER_KEYS.forEach(function (k) { html += catRow(CAT_BY_KEY[k], players); });
    html += summaryRow("Summa övre", players, function (id) { return String(d[id].upper); });
    html += bonusRow(players, d);
    html += secRow("Nedre delen", players.length);
    LOWER_KEYS.forEach(function (k) { html += catRow(CAT_BY_KEY[k], players); });
    html += totalRow(players, d);
    html += '</tbody></table></div>';
    host.innerHTML = html;

    var w = $("winner");
    if (allDone && players.length > 1) {
      var winners = players.filter(function (id) { return d[id].total === maxTotal; });
      var names = winners.map(function (id) { return state.players[id].name; }).join(" & ");
      $("winnerText").innerHTML = esc(names) + " vinner!<small>" + maxTotal + " poäng</small>";
      w.classList.add("show");
    } else { w.classList.remove("show"); }
  }

  function secRow(title, n) { return '<tr class="sec"><th colspan="' + (n + 2) + '">' + title + '</th></tr>'; }
  function catRow(cat, players) {
    var row = '<tr><td class="cat">' + esc(cat.label) + '<small>' + esc(cat.hint) + '</small></td>';
    players.forEach(function (id) {
      var v = cellVal(id, cat.key), has = hasCell(id, cat.key);
      var cls = "cell " + (!has ? "empty" : (v === 0 ? "zero" : "filled"));
      var disp = !has ? "＋" : String(v);
      row += '<td class="' + cls + '" data-player="' + id + '" data-cat="' + cat.key + '"><span class="val">' + disp + '</span></td>';
    });
    return row + '<td class="addcol"></td></tr>';
  }
  function summaryRow(label, players, fn) {
    var row = '<tr class="summary"><td class="cat">' + esc(label) + '</td>';
    players.forEach(function (id) { row += '<td class="cell">' + fn(id) + '</td>'; });
    return row + '<td class="addcol"></td></tr>';
  }
  function bonusRow(players, d) {
    var row = '<tr class="summary"><td class="cat">Bonus<small>vid ' + BONUS_LIMIT + ' (+' + BONUS_VALUE + ')</small></td>';
    players.forEach(function (id) {
      var pd = d[id], cell;
      if (pd.bonus > 0) cell = '+' + BONUS_VALUE + '<span class="bonus-need bonus-ok">✓ klar</span>';
      else cell = '0<span class="bonus-need">' + pd.toBonus + ' kvar</span>';
      row += '<td class="cell">' + cell + '</td>';
    });
    return row + '<td class="addcol"></td></tr>';
  }
  function totalRow(players, d) {
    var row = '<tr class="summary total"><td class="cat">Totalt</td>';
    players.forEach(function (id) { row += '<td class="cell">' + d[id].total + '</td>'; });
    return row + '<td class="addcol"></td></tr>';
  }

  // ---------------------------------------------------------------- Sheet UI
  var backdrop = $("backdrop"), sheet = $("sheet");
  function openSheet(html) { sheet.innerHTML = '<div class="grabber"></div>' + html; backdrop.classList.add("open"); }
  function closeSheet() { backdrop.classList.remove("open"); sheet.innerHTML = ""; }
  backdrop.addEventListener("click", function (e) { if (e.target === backdrop) closeSheet(); });

  function openScoreSheet(pid, catKey) {
    var cat = CAT_BY_KEY[catKey];
    var cur = cellVal(pid, catKey);
    var body = '<h3>' + esc(cat.label) + '</h3><p class="sub">' + esc(state.players[pid].name) + ' &middot; ' + esc(cat.hint) + '</p>';

    if (cat.kind === "fixed") {
      body += '<div class="chips">' +
        '<button class="chip big' + (cur === cat.val ? " cur" : "") + '" data-v="' + cat.val + '">' + cat.val + ' p</button>' +
        '<button class="chip strike big' + (cur === 0 ? " cur" : "") + '" data-v="0">Stryk (0)</button></div>';
    } else if (cat.kind === "mult" || cat.kind === "list") {
      var vals;
      if (cat.kind === "mult") { vals = []; for (var i = 0; i <= cat.count; i++) vals.push(i * cat.mult); }
      else vals = cat.values.slice();
      body += '<div class="chips">';
      vals.forEach(function (v) {
        var c = "chip" + (v === 0 ? " zero" : "") + (cur === v ? " cur" : "");
        body += '<button class="' + c + '" data-v="' + v + '">' + (v === 0 ? "Stryk" : v) + '</button>';
      });
      body += '</div>';
    } else { // free -> keypad
      body += '<div class="kdisplay" id="kdisp">' + (cur != null ? cur : "0") + '</div><div class="keypad">';
      ["1","2","3","4","5","6","7","8","9"].forEach(function (n) { body += '<button class="chip" data-k="' + n + '">' + n + '</button>'; });
      body += '<button class="chip strike" data-k="clr">C</button><button class="chip" data-k="0">0</button><button class="chip zero" data-k="del">⌫</button></div>';
      body += '<div class="row2"><button class="btn sec" data-v="0">Stryk (0)</button><button class="btn primary" id="kok">Klar</button></div>';
    }
    if (cur != null) body += '<div class="row2"><button class="btn danger full" id="clearBtn">Rensa rutan</button></div>';
    body += '<div class="hint">Fyll i poängen kategorin ger. Tryck <b>Stryk</b> om du inte fick något (0 p).</div>';

    openSheet(body);

    Array.prototype.forEach.call(sheet.querySelectorAll("[data-v]"), function (btn) {
      btn.addEventListener("click", function () { setScore(pid, catKey, parseInt(btn.getAttribute("data-v"), 10)); closeSheet(); });
    });
    var clearBtn = $("clearBtn");
    if (clearBtn) clearBtn.addEventListener("click", function () { clearScore(pid, catKey); closeSheet(); });

    if (cat.kind === "free") {
      var buf = (cur != null ? String(cur) : "");
      var disp = $("kdisp");
      var refresh = function () { disp.textContent = buf === "" ? "0" : buf; };
      Array.prototype.forEach.call(sheet.querySelectorAll("[data-k]"), function (btn) {
        btn.addEventListener("click", function () {
          var k = btn.getAttribute("data-k");
          if (k === "clr") buf = "";
          else if (k === "del") buf = buf.slice(0, -1);
          else { if (buf.length < 3) buf += k; }
          buf = buf.replace(/^0+(?=\d)/, "");
          if (buf !== "" && parseInt(buf, 10) > cat.max) buf = String(cat.max);
          refresh();
        });
      });
      $("kok").addEventListener("click", function () {
        var v = buf === "" ? 0 : Math.min(cat.max, parseInt(buf, 10) || 0);
        setScore(pid, catKey, v); closeSheet();
      });
    }
  }

  function openPlayerSheet(pid) {
    var p = state.players[pid];
    openSheet('<h3>' + esc(p.name) + '</h3><p class="sub">Spelare</p>' +
      '<label class="sub" style="display:block;margin-bottom:2px">Namn</label>' +
      '<input class="field" id="pnameInput" value="' + esc(p.name) + '" maxlength="16" />' +
      '<div class="row2"><button class="btn sec" id="pRename">Spara namn</button>' +
      '<button class="btn danger" id="pRemove">Ta bort</button></div>');
    var input = $("pnameInput");
    $("pRename").addEventListener("click", function () { renamePlayer(pid, input.value); closeSheet(); });
    $("pRemove").addEventListener("click", function () {
      if (confirm("Ta bort " + p.name + " och deras poäng?")) { removePlayer(pid); closeSheet(); }
    });
  }

  function openAddPlayerSheet() {
    openSheet('<h3>Ny spelare</h3><p class="sub">Lägg till en spelare på tavlan</p>' +
      '<input class="field" id="newName" placeholder="Namn" maxlength="16" autocomplete="off" />' +
      '<div class="row2"><button class="btn sec" id="addCancel">Avbryt</button>' +
      '<button class="btn primary" id="addOk">Lägg till</button></div>');
    var input = $("newName");
    setTimeout(function () { try { input.focus(); } catch (e) {} }, 60);
    var go = function () { addPlayer(input.value); closeSheet(); };
    $("addOk").addEventListener("click", go);
    $("addCancel").addEventListener("click", closeSheet);
    input.addEventListener("keydown", function (e) { if (e.key === "Enter") go(); });
  }

  function openMenuSheet() {
    openSheet('<h3>Meny</h3><p class="sub">Rum ' + room + '</p>' +
      '<div class="menu-list">' +
      '<button id="mShare"><span class="em">📤</span> Bjud in spelare (dela länk)</button>' +
      '<button id="mAdd"><span class="em">＋</span> Lägg till spelare</button>' +
      '<button id="mNew"><span class="em">🆕</span> Skapa nytt rum</button>' +
      '<button id="mReset" class="warn"><span class="em">♻️</span> Nollställ poäng (samma rum)</button></div>' +
      '<div class="hint">Alla med länken ser samma tavla i realtid och kan fylla i poäng. Rummet är öppet för alla som har koden.</div>');
    $("mShare").addEventListener("click", function () { closeSheet(); doShare(); });
    $("mAdd").addEventListener("click", function () { closeSheet(); openAddPlayerSheet(); });
    $("mNew").addEventListener("click", function () {
      if (confirm("Skapa ett nytt tomt rum? Nuvarande tavla finns kvar på sin länk.")) { location.hash = "#" + rid(4); location.reload(); }
    });
    $("mReset").addEventListener("click", function () {
      if (confirm("Nollställ alla poäng i rummet? Spelarna blir kvar.")) { resetGame(); closeSheet(); toast("Poängen nollställda"); }
    });
  }

  // ---------------------------------------------------------------- Share
  function doShare() {
    var url = location.href;
    if (navigator.share) { navigator.share({ title: "Yatzy scoreboard", text: "Häng med i Yatzy – rum " + room, url: url }).catch(function () {}); }
    else if (navigator.clipboard) { navigator.clipboard.writeText(url).then(function () { toast("Länk kopierad ✓"); }, function () { prompt("Kopiera länken:", url); }); }
    else { prompt("Kopiera länken:", url); }
  }

  // ---------------------------------------------------------------- Events
  document.addEventListener("click", function (e) {
    if (!e.target.closest) return;
    var cell = e.target.closest("td.cell[data-cat]");
    if (cell) { openScoreSheet(cell.getAttribute("data-player"), cell.getAttribute("data-cat")); return; }
    var ph = e.target.closest("th.player[data-player]");
    if (ph) { openPlayerSheet(ph.getAttribute("data-player")); return; }
    if (e.target.closest("#addColBtn")) { openAddPlayerSheet(); return; }
  });
  $("shareBtn").addEventListener("click", doShare);
  $("shareFab").addEventListener("click", doShare);
  $("roomChip").addEventListener("click", doShare);
  $("menuBtn").addEventListener("click", openMenuSheet);
  $("addPlayerFab").addEventListener("click", openAddPlayerSheet);
  window.addEventListener("hashchange", function () { var r = currentRoom(); if (r && r !== room) location.reload(); });
  window.addEventListener("online", function () { setStatus("connecting"); connect(); });
  window.addEventListener("offline", function () { setStatus("off"); });

  // ---------------------------------------------------------------- Boot
  loadLocal();
  render();
  setStatus(navigator.onLine ? "connecting" : "off");
  if (navigator.onLine) connect();
})();
</script>
</body>
</html>
