<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vitalisera AR-kinkamerafilter</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0b1220; color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  video { display: none; }
  canvas#out {
    max-width: 100%; max-height: 100%;
    width: 100%; height: 100%;
    object-fit: contain;
  }
  /* Startskärm */
  #start {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: radial-gradient(circle at 50% 30%, #14233f 0%, #0b1220 70%);
  }
  #start img.brand { width: 120px; height: auto; margin-bottom: 18px; filter: drop-shadow(0 4px 12px rgba(0,0,0,.5)); }
  #start h1 { font-size: 1.5rem; margin: 0 0 8px; font-weight: 700; }
  #start p { font-size: .98rem; line-height: 1.5; max-width: 420px; color: #cbd5e1; margin: 6px 0; }
  #start p.privacy { color: #7dd3fc; font-size: .9rem; margin-top: 14px; }
  .btn {
    appearance: none; border: none; cursor: pointer;
    font-size: 1.05rem; font-weight: 600;
    padding: 14px 26px; border-radius: 999px;
    background: #2563eb; color: #fff;
    box-shadow: 0 6px 18px rgba(37,99,235,.45);
    transition: transform .08s ease, background .2s ease;
  }
  .btn:active { transform: scale(.96); }
  #startBtn { margin-top: 22px; }
  /* Kontroller */
  #controls {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    display: none;
    gap: 12px; justify-content: center; align-items: center;
    padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(11,18,32,.85), rgba(11,18,32,0));
  }
  .ctl {
    appearance: none; border: none; cursor: pointer;
    display: inline-flex; flex-direction: column; align-items: center; gap: 4px;
    background: rgba(30,41,59,.85); color: #f1f5f9;
    border-radius: 16px; padding: 12px 16px; min-width: 84px;
    font-size: .8rem; font-weight: 600;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(148,163,184,.18);
    transition: transform .08s ease, background .2s ease;
  }
  .ctl:active { transform: scale(.94); }
  .ctl .ic { font-size: 1.35rem; line-height: 1; }
  .ctl.off { opacity: .55; }
  #status {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    text-align: center; font-size: .85rem; padding: 10px;
    color: #e2e8f0; pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }
  #err {
    position: fixed; inset: 0; z-index: 40; display: none;
    align-items: center; justify-content: center; padding: 30px; text-align: center;
    background: #0b1220; color: #fca5a5; font-size: 1rem; line-height: 1.5;
  }
</style>
</head>
<body>
  <div id="stage">
    <video id="cam" playsinline autoplay muted></video>
    <canvas id="out"></canvas>
  </div>

  <div id="status"></div>

  <div id="controls">
    <button class="ctl" id="flipBtn"><span class="ic">🔄</span><span>Byt kamera</span></button>
    <button class="ctl" id="logoBtn"><span class="ic">🏷️</span><span>Logga på</span></button>
  </div>

  <div id="start">
    <img class="brand" id="brandLogo" alt="Vitalisera" />
    <h1>Vitalisera AR-kamerafilter</h1>
    <p>Rikta kameran mot ett eller flera ansikten så placeras Vitaliseras logga på kinderna i realtid.</p>
    <p class="privacy">🔒 Allt körs lokalt i din webbläsare – ingen bild lämnar din enhet.</p>
    <button class="btn" id="startBtn">Starta kameran</button>
  </div>

  <div id="err"></div>

const video    = document.getElementById("cam");
const canvas   = document.getElementById("out");
const ctx      = canvas.getContext("2d");
const startEl  = document.getElementById("start");
const startBtn = document.getElementById("startBtn");
const flipBtn  = document.getElementById("flipBtn");
const logoBtn  = document.getElementById("logoBtn");
const controls = document.getElementById("controls");
const statusEl = document.getElementById("status");
const errEl    = document.getElementById("err");

document.getElementById("brandLogo").src = LOGO_DATA_URI;

const logoImg = new Image();
logoImg.src = LOGO_DATA_URI;

let faceLandmarker = null;
let stream = null;
let facingMode = "user";   // "user" = framkamera, "environment" = bakkamera
let showLogo = true;
let running = false;
let lastVideoTime = -1;

function setStatus(t) { statusEl.textContent = t; }
function showError(t) { errEl.textContent = t; errEl.style.display = "flex"; }

async function initLandmarker() {
  setStatus("Laddar ansiktsmodell …");
  const filesetResolver = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numFaces: 5
  });
}

async function startCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const constraints = {
    video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  };
  stream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = stream;
  await video.play();
  await new Promise(res => {
    if (video.readyState >= 2 && video.videoWidth) return res();
    video.onloadedmetadata = () => res();
  });
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
}

async function begin() {
  try {
    startBtn.disabled = true;
    startBtn.textContent = "Startar …";
    if (!faceLandmarker) await initLandmarker();
    await startCamera();
    startEl.style.display = "none";
    controls.style.display = "flex";
    running = true;
    setStatus("");
    requestAnimationFrame(renderLoop);
  } catch (e) {
    console.error(e);
    showError("Kunde inte starta kameran: " + (e && e.message ? e.message : e) +
      "\n\nKontrollera att du gett kameratillstånd och använder HTTPS.");
  }
}

function renderLoop() {
  if (!running) return;
  const mirror = (facingMode === "user");

  // Rita videobilden (spegelvänd för framkameran)
  ctx.save();
  if (mirror) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  if (faceLandmarker && video.currentTime !== lastVideoTime && video.videoWidth) {
    lastVideoTime = video.currentTime;
    const results = faceLandmarker.detectForVideo(video, performance.now());
    if (showLogo && logoImg.complete && results && results.faceLandmarks) {
      for (const lm of results.faceLandmarks) {
        drawLogoOnFace(lm, mirror);
      }
    }
    if (results && results.faceLandmarks) {
      setStatus(results.faceLandmarks.length
        ? results.faceLandmarks.length + " ansikte" + (results.faceLandmarks.length > 1 ? "n" : "") + " spårade"
        : "Söker efter ansikten …");
    }
  }

  requestAnimationFrame(renderLoop);
}

function px(p, mirror) {
  let x = p.x;
  if (mirror) x = 1 - x;     // spegelvänd landmarks så de matchar den speglade bilden
  return { x: x * canvas.width, y: p.y * canvas.height };
}

// Justerbara värden för loggan på pannan:
const LOGO_WIDTH_FACTOR = 0.5;   // bredd som andel av ansiktsbredden
const LOGO_BEND_FACTOR  = 0.07;  // hur mycket loggan välver sig (0 = helt platt)

function drawLogoOnFace(lm, mirror) {
  if (!logoImg.naturalWidth) return;

  // Ansiktsbredd (234 <-> 454) och huvudets lutning (roll).
  const a = px(lm[234], mirror);
  const b = px(lm[454], mirror);
  const faceWidth = Math.hypot(b.x - a.x, b.y - a.y);
  if (!faceWidth || !isFinite(faceWidth)) return;
  // I spegelvänt läge pekar vektorn åt andra hållet -> vänd så loggan står rätt.
  const dx = mirror ? (a.x - b.x) : (b.x - a.x);
  const dy = mirror ? (a.y - b.y) : (b.y - a.y);
  const angle = Math.atan2(dy, dx);

  // Mitten av pannan (landmark 151).
  const center = px(lm[151], mirror);

  const w = faceWidth * LOGO_WIDTH_FACTOR;
  const h = w * (logoImg.naturalHeight / logoImg.naturalWidth);
  const bend = w * LOGO_BEND_FACTOR;
  const cos = Math.cos(angle), sin = Math.sin(angle);

  // Rita loggan i vertikala remsor längs en mild, konvex båge (mitten högst),
  // roterad efter huvudets lutning och placerad på pannan.
  const N = 24;
  const sw = logoImg.naturalWidth / N;
  const dw = w / N;
  for (let i = 0; i < N; i++) {
    const u = (i + 0.5) / N;            // 0..1 över bredden
    const lx = (u - 0.5) * w;           // lokal x, centrerad
    const k = (u - 0.5) * 2;            // -1..1
    const ly = -bend * (1 - k * k);     // konvex uppåt (negativt = upp)
    const slope = (8 * bend * lx) / (w * w);  // lokal tangentlutning

    // Lokala koordinater -> skärm (rotera med roll, flytta till pannan).
    const sx = center.x + lx * cos - ly * sin;
    const sy = center.y + lx * sin + ly * cos;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(angle + Math.atan(slope));
    ctx.drawImage(
      logoImg,
      i * sw, 0, sw, logoImg.naturalHeight,   // källa: en lodrät skiva
      -dw / 2 - 0.5, -h / 2, dw + 1, h        // mål: centrerad (+overlap mot sömmar)
    );
    ctx.restore();
  }
}

startBtn.addEventListener("click", begin);

flipBtn.addEventListener("click", async () => {
  facingMode = (facingMode === "user") ? "environment" : "user";
  try { await startCamera(); }
  catch (e) {
    // Vissa enheter saknar vald kamera – byt tillbaka
    facingMode = (facingMode === "user") ? "environment" : "user";
    try { await startCamera(); } catch (_) {}
    showError("Kunde inte byta kamera: " + (e && e.message ? e.message : e));
  }
});

logoBtn.addEventListener("click", () => {
  showLogo = !showLogo;
  logoBtn.classList.toggle("off", !showLogo);
  logoBtn.querySelector("span:last-child").textContent = showLogo ? "Logga på" : "Logga av";
});
</script>
